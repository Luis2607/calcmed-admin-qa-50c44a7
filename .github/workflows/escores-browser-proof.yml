name: Escores browser proof

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: URL publica ou temporaria da rota /escores-qa.html
        required: true
        type: string

concurrency:
  group: escores-browser-proof
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  qa-hospedada:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ESCORES_QA_BASE_URL: ${{ inputs.base_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Diagnosticar endpoint
        run: node -e "fetch(process.env.ESCORES_QA_BASE_URL).then(async r => console.log(JSON.stringify({status:r.status,url:r.url,type:r.headers.get('content-type')})))"

      - name: Instalar Playwright
        run: npm install --no-save --package-lock=false playwright@1.61.1

      - name: Instalar Chromium
        run: npx playwright install --with-deps chromium

      - name: Executar QA visivel
        run: node scripts/qa-escores-hosted.mjs

      - name: Anexar evidencia
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ticket-16-8g-hosted
          path: evidence/ticket-16.8g/hosted
          if-no-files-found: error
